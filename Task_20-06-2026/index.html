<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="yellow-card">
        <div class="Logo">
            <img align="left" src="BRPD.png" alt="BRPD Logo"
            width="50">

            <img align="center" src="49th_SpecialEditionLogo.png" alt="49th_SpecialEditionLogo Logo"
            width="50">

            <img align="right" src="UK_Police_Emblem.png" alt="UK Police Emblem"
            width="50">
        </div>

        <br>
        <div class="purple-strip-top"></div>
        <br>

        <div class="main-title">
            <h2>49th ALL INDIA POLICE SCIENCE CONGRESS <br> UTTRAKHAND</h2>
        </div>
        
        <div class="table">
            <table class="table">
             <tr>
                <td><b>Name</b></td> <td><b>:</b></td> <td><b>Gaurav Kumar</b></td> </tr>
            <tr>
                 <td><b>Rank</b></td> <td><b>:</b></td> <td><b>SV Infotech</b></td> </tr>
            <tr>
                 <td><b>Organisation</b></td> <td><b>:</b></td> <td><b>Uttrakhand Police</b></td> </tr>
            <tr>
                 <td><b>State</b></td> <td><b>:</b></td> <td><b>Uttrakhand</b></td> </tr>
            <tr>
                 <td><b>Date of Issue</b></td> <td><b>:</b></td> <td><b>06-Oct-2023</b></td> </tr>
            <tr>
                 <td><b>Valid Upto</b></td> <td><b>:</b></td> <td><b>09-Oct-2023</b></td> </tr>
            </table>
        </div>
        
        <div class="Signature">
            <h4>Signature <br> Issuing Authority</h4>
        </div>

        <div class="purple-strip-bottom">
            <h1>ORGANISING TEAM</h1>
        </div>

    </div>
</body>
</html>
